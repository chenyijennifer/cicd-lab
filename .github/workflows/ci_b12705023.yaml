name: CI Pipeline

on:
  push:
    branches:
      - '**'

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write

jobs:
  check-and-test:
    name: Typecheck, Format, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 根據 package.json 的 engines
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: TypeScript Typecheck
        run: npm run typecheck

      - name: Prettier Format Check
        run: npm run format:check

      - name: Run Tests & Generate JUnit Report
        run: npx vitest run --reporter default --reporter junit --outputFile.junit=test-results.xml

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() # 確保即使測試失敗也能發布測試報告
        with:
          files: test-results.xml
